services:
  # ── PostgreSQL ─────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB:       webcore
      POSTGRES_USER:     webcore
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    # Port intentionally not exposed to host — app connects via internal Docker network.
    # Uncomment only for local debugging; never expose in production.
    # ports:
    #   - "127.0.0.1:5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U webcore -d webcore"]
      interval: 5s
      timeout: 5s
      retries: 10
    deploy:
      resources:
        limits:
          memory: 256M

  # ── DB Migrations (runs once, exits 0) ────────────────────
  migrate:
    build:
      context: .
      dockerfile: Dockerfile
      target: runner
    env_file: .env.local
    environment:
      NODE_ENV:     production
      DATABASE_URL: postgresql://webcore:${POSTGRES_PASSWORD}@db:5432/webcore
    depends_on:
      db:
        condition: service_healthy
    command: sh -c "npx prisma migrate deploy"
    restart: "no"

  # ── Production Build ───────────────────────────────────────
  webcore-site:
    build:
      context: .
      dockerfile: Dockerfile
      target: runner
    ports:
      - "5000:3000"
    env_file: .env.local
    environment:
      NODE_ENV:             production
      NEXT_PUBLIC_BASE_URL: ${NEXT_PUBLIC_BASE_URL:-http://localhost:5000}
      DATABASE_URL:         postgresql://webcore:${POSTGRES_PASSWORD}@db:5432/webcore
    depends_on:
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    restart: unless-stopped
    stop_grace_period: 30s
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/api/health 2>/dev/null | grep -q '\"ok\"' || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    command: node startup.mjs
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M

  # ── Dev-Modus (Hot-Reload) ─────────────────────────────────
  webcore-dev:
    build:
      context: .
      dockerfile: Dockerfile.dev
    volumes:
      - .:/app
      - /app/node_modules
      - /app/.next
    ports:
      - "3001:3000"
    env_file: .env.local
    environment:
      NODE_ENV:                development
      NEXT_PUBLIC_BASE_URL:    http://localhost:3001
      NEXT_TELEMETRY_DISABLED: "1"
      DATABASE_URL:            postgresql://webcore:${POSTGRES_PASSWORD}@db:5432/webcore
    depends_on:
      migrate:
        condition: service_completed_successfully
    command: npm run dev -- -p 3000
    profiles:
      - dev   # nur mit: docker compose --profile dev up

volumes:
  postgres_data:
