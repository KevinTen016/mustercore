services:
  webcore-site:
    build:
      context: .
      dockerfile: Dockerfile
      target: runner          # Production Image
    ports:
      - "5000:3000"
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_BASE_URL=http://localhost:5000
      - DB_PATH=/app/data/db.json
    volumes:
      - webcore-data:/app/data
    restart: unless-stopped

  # Schneller Dev-Modus (kein Build nötig, Hot-Reload)
  webcore-dev:
    image: node:20-alpine
    working_dir: /app
    volumes:
      - .:/app
      - /app/node_modules
    ports:
      - "3001:3000"
    environment:
      - NODE_ENV=development
      - NEXT_PUBLIC_BASE_URL=http://localhost:3001
      - NEXT_TELEMETRY_DISABLED=1
      - DB_PATH=/app/data/db.json
    command: sh -c "npm install && npm run dev -- -p 3000"
    profiles:
      - dev                   # nur mit: docker compose --profile dev up

volumes:
  webcore-data:               # Persistente Daten (db.json) ausserhalb des Containers
