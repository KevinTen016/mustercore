server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;
    charset utf-8;

    # Security headers (admin panel — no public indexing)
    add_header X-Frame-Options SAMEORIGIN always;
    add_header X-Content-Type-Options nosniff always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy no-referrer always;

    # Gzip
    gzip on;
    gzip_types text/html text/css application/javascript text/plain;
    gzip_min_length 1024;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # No caching for HTML (template is updated frequently)
    location ~* \.html$ {
        expires -1;
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }

    # Static assets (css/js/img — once split out)
    location ~* \.(css|js|png|jpg|svg|ico|woff2?)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # Robots — block all crawlers on admin panel
    location = /robots.txt {
        return 200 "User-agent: *\nDisallow: /\n";
        add_header Content-Type text/plain;
    }

    # Suppress nginx version in error pages
    server_tokens off;
}
